receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch:

exporters:
  # Log traces to console for development
  debug:
    verbosity: detailed

  # Uncomment and configure to send to Datadog
  # datadog:
  #   api:
  #     key: ${DATADOG_API_KEY}
  #     site: datadoghq.com

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]  # Change to [datadog] when using Datadog