services:
  mysql:
    profiles:
      - mysql
    container_name: shared-mysql
    image: 'mysql/mysql-server:8.0'
    restart: unless-stopped
    ports:
      - '127.0.0.1:${FORWARD_DB_PORT:-3306}:3306'
    environment:
      MYSQL_ROOT_PASSWORD: '${MYSQL_DB_PASSWORD}'
      MYSQL_PASSWORD: '${MYSQL_DB_PASSWORD}'
      MYSQL_USER: '${MYSQL_DB_USERNAME}'
      MYSQL_DATABASE: '${MYSQL_DB_DATABASE}'
    volumes:
      - './shared-mysql:/var/lib/mysql'
      - './create-testing-database.sh:/docker-entrypoint-initdb.d/10-create-testing-database.sh'
    networks:
      - shared-development
    healthcheck:
      test:
        - CMD
        - mysqladmin
        - ping
        - '-p${MYSQL_DB_PASSWORD}'
      retries: 3
      timeout: 5s